services:
  - type: web
    name: oneway-backend
    env: node
    buildCommand: npm install && cd ../frontend && npm install && npm run build && cd ../backend
    startCommand: npm run seed && npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        fromDatabase:
          name: oneway-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: commander48
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: oneway-db
    type: mongodb
    plan: free
